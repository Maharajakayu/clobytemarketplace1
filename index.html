<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clobyte Marketplace</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

      :root {
        --bg: #050914;
        --panel: #101421;
        --panel-2: #151927;
        --panel-3: #0d1220;
        --line: #252a42;
        --muted: #8a91aa;
        --text: #f7f5ff;
        --purple: #5630d4;
        --purple-2: #8b5cf6;
        --green: #25c15f;
        --red: #e72e36;
        --yellow: #f7e84a;
        --blue: #2293ff;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 36% 30%, #15104a 0, transparent 34%), var(--bg);
        color: var(--text);
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .auth-page {
        min-height: 100vh;
        height: 100vh;
        display: grid;
        grid-template-columns: minmax(620px, 1fr) 548px;
        align-items: start;
        gap: 52px;
        padding: 91px 56px 71px 78px;
        overflow: hidden;
        background: radial-gradient(circle at 38% 48%, rgba(86, 48, 212, 0.26) 0, rgba(86, 48, 212, 0.11) 27%, transparent 56%), var(--bg);
      }

      .auth-page.auth-register {
        grid-template-columns: 448px minmax(720px, 807px);
        gap: 57px;
        padding-left: 72px;
      }

      .auth-visual {
        position: relative;
        min-height: 862px;
      }

      .brand-logo {
        display: inline-flex;
        align-items: center;
        width: 247px;
        height: 80px;
        line-height: 1;
      }

      .brand-image {
        display: block;
        width: 247px;
        height: auto;
      }

      .auth-copy {
        max-width: 360px;
        margin: 62px 0 0;
        color: #f2efff;
        font-size: 22px;
        line-height: 1.8;
      }

      .auth-left-title {
        margin: 62px 0 0;
        color: #fff;
        font-size: 31px;
        line-height: 1.15;
      }

      .auth-left-title + .auth-copy {
        margin-top: 24px;
        line-height: 1.45;
      }

      .auth-login .auth-copy {
        max-width: 312px;
      }

      .auth-register .auth-copy {
        max-width: 420px;
      }

      .trust-list {
        display: grid;
        gap: 28px;
        margin-top: 42px;
        font-size: 22px;
      }

      .auth-page.auth-register .trust-list {
        margin-top: 48px;
      }

      .trust-list span {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .trust-icon {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        color: #fff;
        flex: 0 0 32px;
      }

      .trust-icon svg,
      .nav-icon svg,
      .icon-btn svg,
      .password-toggle svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .warrior {
        position: absolute;
        left: 315px;
        bottom: 147px;
        width: 420px;
        max-height: 610px;
        object-fit: contain;
        pointer-events: none;
        filter: drop-shadow(18px 24px 18px rgba(0, 0, 0, 0.36));
      }

      .auth-page.auth-register .warrior {
        left: 54px;
        bottom: -8px;
        width: 374px;
        max-height: none;
      }

      .auth-card {
        position: relative;
        z-index: 2;
        width: 100%;
        min-height: 852px;
        margin-top: 10px;
        padding: 68px 40px 45px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(16, 20, 33, 0.96);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      }

      .auth-page.auth-register .auth-card {
        padding: 58px 32px 44px;
      }

      .auth-card h1 {
        margin: 0;
        text-align: center;
        font-size: 31px;
      }

      .auth-card p {
        margin: 10px 0 62px;
        text-align: center;
        color: #f0edfa;
        font-size: 20px;
      }

      .auth-page.auth-register .auth-card p {
        margin-bottom: 72px;
      }

      .field {
        display: grid;
        gap: 12px;
        margin-bottom: 28px;
        color: #fff;
        font-size: 20px;
      }

      .input-wrap {
        position: relative;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #151927;
        color: var(--text);
        outline: none;
        transition: border 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .input,
      .select {
        height: 70px;
        padding: 0 36px;
        font-size: 20px;
      }

      .register-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 36px;
        row-gap: 28px;
      }

      .register-grid .field {
        margin-bottom: 0;
      }

      .register-grid .input {
        height: 70px;
        padding: 0 32px;
        font-size: 20px;
      }

      .textarea {
        min-height: 118px;
        padding: 18px 20px;
        resize: vertical;
      }

      .input::placeholder,
      .textarea::placeholder {
        color: #808699;
      }

      .input:focus,
      .select:focus,
      .textarea:focus {
        border-color: var(--purple-2);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
      }

      .password-toggle {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 24px;
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
      }

      .consent-row {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 24px 0 22px;
        color: #f2effa;
        font-size: 20px;
      }

      .consent-row input {
        width: 26px;
        height: 26px;
        margin: 0;
        accent-color: var(--purple-2);
      }

      .row-between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .link-button {
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--purple-2);
        cursor: pointer;
      }

      .primary-btn,
      .secondary-btn,
      .danger-btn,
      .ghost-btn,
      .small-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border-radius: 9px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: transform 0.16s ease, filter 0.16s ease, border 0.16s ease, background 0.16s ease;
      }

      .primary-btn {
        min-height: 48px;
        padding: 0 24px;
        background: var(--purple);
        color: #fff;
        font-weight: 800;
      }

      .primary-btn svg,
      .secondary-btn svg,
      .danger-btn svg,
      .ghost-btn svg,
      .small-btn svg {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }

      .secondary-btn {
        min-height: 44px;
        padding: 0 22px;
        background: #1b2032;
        border-color: var(--line);
        color: #f4f1ff;
      }

      .danger-btn {
        min-height: 44px;
        padding: 0 22px;
        background: var(--red);
        color: #fff;
        font-weight: 700;
      }

      .ghost-btn {
        min-height: 40px;
        padding: 0 18px;
        background: transparent;
        border-color: var(--line);
        color: #d8d5e5;
      }

      .small-btn {
        min-height: 31px;
        padding: 0 13px;
        background: var(--purple);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }

      button:hover {
        filter: brightness(1.08);
      }

      button:active {
        transform: translateY(1px);
      }

      .auth-submit {
        width: 100%;
        height: 69px;
        margin-top: 22px;
        font-size: 24px;
      }

      .auth-page.auth-register .auth-submit {
        margin-top: 0;
      }

      .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 18px;
        margin: 24px 10px 34px;
        color: #f2effa;
        font-size: 19px;
      }

      .auth-page.auth-register .divider {
        margin: 16px 10px 30px;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: #f2effa;
      }

      .social-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 26px;
      }

      .auth-page.auth-register .social-grid {
        gap: 36px;
      }

      .social-grid button {
        height: 70px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #151927;
        font-size: 24px;
        font-weight: 800;
        cursor: pointer;
      }

      .social-icon {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      .social-icon.discord {
        width: 34px;
        height: 34px;
      }

      .auth-switch {
        margin-top: 28px;
        text-align: center;
        color: #f2effa;
        font-size: 20px;
      }

      .auth-page.auth-register .auth-switch {
        margin-top: 22px;
      }

      .auth-page.auth-steam {
        position: relative;
        isolation: isolate;
        min-height: 100svh;
        height: auto;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
        place-items: center;
        padding: 30px 28px;
        overflow: auto;
        background:
          linear-gradient(115deg, rgba(5, 9, 20, 0.96) 0%, rgba(12, 10, 40, 0.92) 48%, rgba(5, 9, 20, 0.98) 100%),
          var(--bg);
      }

      .auth-steam::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(circle at 21% 23%, rgba(86, 48, 212, 0.32), transparent 30%),
          radial-gradient(circle at 74% 78%, rgba(34, 147, 255, 0.18), transparent 28%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: auto, auto, 74px 74px, 74px 74px;
        opacity: 0.9;
      }

      .auth-floaters {
        position: absolute;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .auth-floaters img {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        opacity: var(--opacity, 0.22);
        transform: rotate(var(--rotate, 0deg));
        filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.4));
        animation: auth-drift var(--duration, 13s) ease-in-out infinite alternate;
        animation-delay: var(--delay, 0s);
      }

      @keyframes auth-drift {
        from {
          translate: 0 0;
        }

        to {
          translate: var(--dx, 18px) var(--dy, -24px);
        }
      }

      .auth-stage {
        position: relative;
        z-index: 1;
        width: min(100%, 1050px);
        min-height: min(690px, calc(100svh - 60px));
        display: grid;
        grid-template-columns: minmax(290px, 380px) minmax(360px, 462px);
        align-items: center;
        justify-content: center;
        gap: 46px;
      }

      .auth-register .auth-stage {
        width: min(100%, 1110px);
        grid-template-columns: minmax(280px, 360px) minmax(520px, 608px);
        gap: 44px;
      }

      .auth-teaser {
        min-width: 0;
      }

      .auth-steam .brand-logo {
        width: 208px;
        height: 68px;
      }

      .auth-steam .brand-image {
        width: 208px;
      }

      .auth-steam .auth-copy {
        max-width: 330px;
        margin-top: 34px;
        font-size: 17px;
        line-height: 1.65;
      }

      .auth-steam .auth-left-title {
        margin-top: 34px;
        font-size: 27px;
      }

      .auth-steam .auth-left-title + .auth-copy {
        margin-top: 14px;
        line-height: 1.55;
      }

      .auth-steam .trust-list {
        gap: 14px;
        margin-top: 24px;
        font-size: 15px;
      }

      .auth-steam .trust-list span {
        gap: 13px;
      }

      .auth-steam .trust-icon {
        width: 22px;
        height: 22px;
        flex-basis: 22px;
      }

      .auth-art {
        position: relative;
        width: min(100%, 330px);
        min-height: 235px;
        margin-top: 26px;
      }

      .auth-art::before {
        content: none;
      }

      .auth-art img {
        position: relative;
        width: 100%;
        max-height: 355px;
        object-fit: contain;
        filter: drop-shadow(14px 24px 18px rgba(0, 0, 0, 0.45));
      }

      .auth-login .auth-art img {
        filter: drop-shadow(18px 28px 20px rgba(0, 0, 0, 0.42));
      }

      .auth-register .auth-art {
        width: 300px;
        min-height: 210px;
      }

      .auth-card.compact-auth {
        width: 100%;
        min-height: 0;
        margin: 0;
        padding: 32px 34px 28px;
        border-radius: 8px;
        background: rgba(16, 20, 33, 0.86);
        border-color: rgba(139, 92, 246, 0.2);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .auth-register .auth-card.compact-auth {
        padding: 30px 32px 26px;
      }

      .compact-auth h1 {
        font-size: 27px;
      }

      .compact-auth p {
        margin: 8px 0 28px;
        font-size: 15px;
        color: #d9d5e7;
      }

      .auth-register .compact-auth p {
        margin-bottom: 24px;
      }

      .compact-auth .field {
        gap: 8px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .compact-auth .input,
      .compact-auth .select {
        height: 52px;
        padding: 0 18px;
        border-radius: 8px;
        font-size: 15px;
      }

      .compact-auth .input-wrap {
        display: block;
      }

      .compact-auth .password-toggle {
        right: 16px;
        width: 20px;
        height: 20px;
      }

      .compact-auth .register-grid {
        column-gap: 18px;
        row-gap: 16px;
      }

      .compact-auth .register-grid .input {
        height: 52px;
        padding: 0 18px;
        font-size: 15px;
      }

      .compact-auth .row-between {
        margin-top: -4px;
        font-size: 14px;
      }

      .compact-auth .consent-row {
        gap: 10px;
        margin: 16px 0 18px;
        font-size: 14px;
      }

      .compact-auth .consent-row input {
        width: 20px;
        height: 20px;
      }

      .compact-auth .auth-submit {
        height: 52px;
        margin-top: 18px;
        border-radius: 8px;
        font-size: 17px;
      }

      .auth-register .compact-auth .auth-submit {
        margin-top: 0;
      }

      .compact-auth .divider {
        gap: 14px;
        margin: 18px 2px 18px;
        font-size: 14px;
        color: #d9d5e7;
      }

      .compact-auth .social-grid {
        gap: 14px;
      }

      .compact-auth .social-grid button {
        height: 50px;
        gap: 10px;
        border-radius: 8px;
        font-size: 16px;
      }

      .compact-auth .social-icon {
        width: 24px;
        height: 24px;
      }

      .compact-auth .social-icon.discord {
        width: 27px;
        height: 27px;
      }

      .compact-auth .auth-switch {
        margin-top: 18px;
        font-size: 14px;
      }

      @media (prefers-reduced-motion: reduce) {
        .auth-floaters img {
          animation: none;
        }
      }

      @media (max-width: 920px) {
        .auth-page.auth-steam {
          place-items: start center;
          padding: 24px 18px;
        }

        .auth-stage,
        .auth-register .auth-stage {
          min-height: auto;
          grid-template-columns: 1fr;
          gap: 22px;
        }

        .auth-teaser {
          display: grid;
          grid-template-columns: 1fr auto;
          align-items: center;
          gap: 18px;
        }

        .auth-steam .auth-copy,
        .auth-steam .auth-left-title,
        .auth-steam .trust-list {
          display: none;
        }

        .auth-art,
        .auth-register .auth-art {
          width: 112px;
          min-height: 92px;
          margin: 0;
        }

        .auth-card.compact-auth,
        .auth-register .auth-card.compact-auth {
          padding: 26px 22px 24px;
        }

        .compact-auth .register-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-height: 760px) and (min-width: 921px) {
        .auth-page.auth-steam {
          padding-block: 18px;
        }

        .auth-stage {
          min-height: 632px;
          gap: 36px;
        }

        .auth-steam .brand-logo,
        .auth-steam .brand-image {
          width: 180px;
        }

        .auth-steam .auth-copy,
        .auth-steam .auth-left-title {
          margin-top: 24px;
        }

        .auth-art {
          width: 285px;
          min-height: 200px;
          margin-top: 18px;
        }

        .auth-card.compact-auth {
          padding-block: 26px 24px;
        }
      }

      .app-screen {
        position: relative;
        isolation: isolate;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 30px 28px;
        overflow: auto;
        background:
          linear-gradient(115deg, rgba(5, 9, 20, 0.96) 0%, rgba(12, 10, 40, 0.92) 48%, rgba(5, 9, 20, 0.98) 100%),
          var(--bg);
      }

      .app-screen::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(circle at 18% 24%, rgba(86, 48, 212, 0.32), transparent 30%),
          radial-gradient(circle at 78% 72%, rgba(34, 147, 255, 0.18), transparent 28%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: auto, auto, 74px 74px, 74px 74px;
        opacity: 0.9;
      }

      .app-screen .auth-floaters img {
        opacity: calc(var(--opacity, 0.18) + 0.08);
      }

      .app {
        position: relative;
        z-index: 1;
        width: min(100%, 1180px);
        height: min(760px, calc(100svh - 60px));
        min-height: 620px;
        display: grid;
        grid-template-columns: 188px minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid rgba(139, 92, 246, 0.22);
        border-radius: 8px;
        background: rgba(7, 10, 21, 0.88);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(18px);
      }

      .sidebar {
        position: relative;
        top: 0;
        height: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 30px 0 20px;
        border-right: 1px solid rgba(139, 92, 246, 0.2);
        background: rgba(18, 21, 34, 0.92);
      }

      .sidebar .brand-logo {
        flex: 0 0 auto;
        width: 116px;
        height: 40px;
        margin: 0 auto 30px;
        overflow: hidden;
        white-space: nowrap;
      }

      .sidebar .brand-image {
        width: 116px;
      }

      .nav {
        display: grid;
        gap: 8px;
        min-height: 0;
        overflow: auto;
      }

      .nav button,
      .bottom-nav button {
        width: 100%;
        height: 45px;
        display: grid;
        grid-template-columns: 38px 1fr;
        align-items: center;
        border: 0;
        padding: 0 26px;
        background: transparent;
        color: #fff;
        text-align: left;
        font-size: 14px;
        cursor: pointer;
      }

      .nav button:hover,
      .bottom-nav button:hover {
        background: #252a36;
      }

      .nav button.active {
        background: var(--purple);
      }

      .nav-icon {
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
        color: currentColor;
      }

      .bottom-nav {
        position: static;
        display: grid;
        gap: 8px;
        margin-top: auto;
        padding-top: 16px;
        flex: 0 0 auto;
      }

      .main {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        height: 76px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 18px;
        padding: 0 24px;
        border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        background: rgba(16, 20, 33, 0.72);
      }

      .search-box {
        position: relative;
      }

      .search-box input {
        width: 100%;
        height: 50px;
        padding: 0 44px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #151927;
        color: #fff;
        font-size: 15px;
        outline: none;
      }

      .search-box::before {
        content: "";
        position: absolute;
        left: 18px;
        top: 17px;
        width: 11px;
        height: 11px;
        border: 1.8px solid #747b96;
        border-radius: 50%;
      }

      .search-box::after {
        content: "";
        position: absolute;
        left: 30px;
        top: 30px;
        width: 9px;
        height: 1.8px;
        background: #747b96;
        transform: rotate(45deg);
        transform-origin: left center;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: #fff;
        font-size: 28px;
        cursor: pointer;
      }

      .switch {

        cursor: pointer;
        transition: background 0.18s ease;

        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.18s ease;

      .switch input:checked + .slider {

        if (state.sort === "Termahal") list.sort((a, b) => b.price - a.price);

      function renderMessages() {
        const conversations = getConversationList();
        const chat = getSelectedConversation();
        if (chat && !state.selectedConversation) state.selectedConversation = chat.id;
        const relatedTransaction = chat ? state.transactions.find((trx) => trx.id === chat.transactionId) : null;
        const relatedProduct = chat ? getProduct(chat.productId) : null;
        const relatedStatus = relatedTransaction?.status === "Selesai" ? "done" : relatedTransaction?.status === "Dibatalkan" ? "cancelled" : "pending";
        const renderBubble = (message) => {
          const isBuyer = message.from === "buyer";
          const role = isBuyer ? "Pembeli" : message.from === "bot" ? "Asisten Seller" : "Penjual";
          return `<div class="bubble ${isBuyer ? "me" : ""}"><span class="chat-role">${role}</span>${escapeHtml(message.text)}<br><small class="muted">${message.time || "Baru saja"}</small></div>`;
        };
        const typingBubble = chat && state.chatTypingConversation === chat.id ? `<div class="bubble typing"><span class="chat-role">Asisten Seller</span><span class="typing-label">Bot sedang mengetik...</span><span class="typing-dots" aria-label="Bot sedang mengetik"><i></i><i></i><i></i></span></div>` : "";
        return `

                const last = item.messages[item.messages.length - 1];
                return `<button class="message-item ${state.selectedConversation === item.id ? "active" : ""}" data-conversation="${item.id}" type="button">
                  ${sellerAvatar("avatar")}
                  <span><strong>${item.seller}</strong><br><small class="muted">${product.name} - ${last ? last.text : "Belum ada pesan"}</small></span>
                  <small class="muted">${last?.time || "Baru"}</small>
                </button>`;
              }).join("") : `<div class="conversation-empty">Belum ada percakapan.</div>`}
            </aside>
            <article class="chat-panel">
              ${chat ? `
                <div class="chat-head">
                  <div class="seller-line" style="margin:0">${sellerAvatar("avatar")}<span><strong>${chat.seller}</strong><br><small class="muted"><span class="ai-status-dot"></span>${chat.transactionId ? `Transaksi ${chat.transactionId}` : "Chat produk"}</small></span></div>
                  <div style="display:flex;gap:10px;align-items:center"><button class="ghost-btn" data-route="marketplace" type="button">${icon("marketplace")} Lihat Toko</button><button class="ghost-btn" data-modal="report" type="button">...</button></div>

                  <strong style="margin-left:auto">${relatedTransaction ? formatRupiah(relatedTransaction.total) : formatRupiah(relatedProduct.price)}</strong>
                  <span class="status ${relatedStatus}">${relatedTransaction?.status || "Ready"}</span>
                </div>` : ""}
                <div class="chat-body">
                  ${chat.messages.length || typingBubble ? `<small class="chat-date">Percakapan</small>${chat.messages.map(renderBubble).join("")}${typingBubble}` : `<div class="conversation-empty">Belum ada percakapan.</div>`}
                </div>

            <article class="account-panel settings-card">
              <h3 style="margin-top:0">Notifikasi</h3>
              ${["Notifikasi Transaksi", "Notifikasi Pesan", "Notifikasi Promo", "Notifikasi Wishlist"].map((label, index) => `<div class="settings-row"><span><strong>${label}</strong><br><small class="muted">Dapatkan informasi terbaru dari Clobyte.</small></span><label class="switch"><input type="checkbox" ${index < 3 ? "checked" : ""}><span class="slider"></span></label></div>`).join("")}
            </article>
            <article class="account-panel settings-card">
              <h3 style="margin-top:0">Keamanan</h3>
              <div class="settings-row"><span><strong>Ubah Password</strong><br><small class="muted">Perbarui password akun kamu.</small></span><button class="ghost-btn" type="button">›</button></div>
              <div class="settings-row"><span><strong>Verifikasi 2 Langkah</strong><br><small class="muted">Tambahkan lapisan keamanan.</small></span><span class="status pending">Belum Aktif</span></div>
              <div class="settings-row"><span><strong>Perangkat Terpercaya</strong><br><small class="muted">Kelola perangkat yang login.</small></span><button class="ghost-btn" type="button">›</button></div>
            </article>
            <article class="account-panel settings-card">
              <h3 style="margin-top:0">Privasi</h3>
              <div class="settings-row"><span><strong>Akun Privat</strong><br><small class="muted">Sembunyikan aktivitas dari pengguna lain.</small></span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
              <div class="settings-row"><span><strong>Sembunyikan Email</strong><br><small class="muted">Sembunyikan email dari publik.</small></span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </article>
            <article class="account-panel settings-card wide">
              <h3 style="margin-top:0">Toko yang Diblokir</h3>
              <p class="muted">Kamu tidak akan melihat produk dari toko yang diblokir.</p>
              <div class="blocked-store">${sellerAvatar("avatar")}<strong>Velsou Store</strong><span class="muted">Diblokir sejak 25 Mei 2026</span><button class="danger-btn" type="button">Hapus</button></div>
            </article>
          </section>
        `;
      }

      function renderNotifications() {
        return `
          ${pageHeader("Notifikasi")}
          <div class="row-between" style="margin-bottom:18px"><p class="muted">Pusat semua notifikasi akunmu.</p><button class="secondary-btn" data-action="mark-read" type="button">Tandai Semua Sudah Dibaca</button></div>
          <div class="notification-list">
            ${state.notifications.map((item) => `<article class="notification-card"><span class="notification-icon">${item.type}</span><div><strong>${item.title}</strong><p class="muted">${item.body}</p></div><span class="${item.unread ? "status pending" : "muted"}">${item.unread ? "Baru" : item.time}</span></article>`).join("")}
          </div>
        `;
      }

      function renderHelp() {
        const helpTopics = [
          ["shield", "Akun & Keamanan", "Kelola akun, password, dan keamanan akunmu."],
          ["wallet", "Transaksi & Pembayaran", "Informasi seputar transaksi, pembayaran, dan refund."],
          ["store", "Marketplace", "Belanja, jual beli, dan informasi tentang produk."],
          ["messages", "Pesan & Komunikasi", "Bantuan terkait pesan, chat, dan komunikasi."],
          ["help", "Lainnya", "Kebijakan, fitur, dan informasi lainnya."],
        ];
        const faqs = [
          "Bagaimana cara membeli item di marketplace?",
          "Bagaimana cara menjual item di marketplace?",
          "Metode pembayaran apa saja yang tersedia?",
          "Kapan saya akan menerima item setelah pembayaran?",
          "Bagaimana jika item yang diterima tidak sesuai?",
          "Bagaimana cara menghubungi seller?",
          "Bagaimana cara menghubungi tim The Conqueror?",
        ];
        return `
          <h1 class="page-title">Bantuan</h1>
          <p class="page-subtitle">Temukan jawaban, panduan, dan cara menghubungi kami.</p>
          <section class="help-page">
            <div class="help-section-title">Topik Bantuan</div>
            <div class="help-topic-grid">
              ${helpTopics.map(([iconName, title, desc]) => `<button class="help-card" data-action="help-topic" type="button"><span class="help-icon">${icon(iconName)}</span><h3>${title}</h3><p>${desc}</p></button>`).join("")}
            </div>
            <div class="help-content-grid">
              <div class="account-panel help-faq-panel">
                <h2>Pertanyaan yang Sering Diajukan</h2>
                <div class="faq-list">
                  ${faqs.map((q, i) => `<div class="faq-item ${i === 0 ? "open" : ""}"><button data-faq type="button"><span>${q}</span><span>+</span></button><div class="faq-answer">Pilih item, lakukan checkout, selesaikan pembayaran, lalu ikuti instruksi seller. Semua status bisa dipantau dari menu Transaksi.</div></div>`).join("")}
                </div>
              </div>
              <aside class="account-panel help-support-panel">
                <h2>Butuh Bantuan Lebih Lanjut?</h2>
                <p>Tim support kami siap membantu menyelesaikan kendala yang kamu alami.</p>
                <button class="help-contact" data-action="contact-support" type="button"><span class="help-contact-icon">${icon("messages")}</span><span><strong>Hubungi Customer Support</strong><small>Bantuan melalui chat</small></span></button>
                <button class="help-contact" data-action="contact-support" type="button"><span class="help-contact-icon">${icon("store")}</span><span><strong>Kirim Email</strong><small>support@clobyte.id</small></span></button>
                <button class="help-contact" data-action="contact-support" type="button"><span class="help-contact-icon">${icon("bell")}</span><span><strong>Hubungi Restu</strong><small>Admin responsif 24/7</small></span></button>
              </aside>
            </div>
            <div class="account-panel help-safe-tip"><span class="nav-icon">${icon("shield")}</span><span><strong>Tips Aman Bertransaksi</strong><small>Jangan pernah memberikan informasi akun atau password kamu kepada siapapun.</small></span></div>
          </section>
        `;
      }

      function renderModal() {
        if (!state.modal) return "";
        const close = `<button class="close-btn" data-modal-close type="button">×</button>`;
        const templates = {
          reviews: `<div class="modal wide"><div class="modal-head"><h2>Semua Ulasan</h2>${close}</div><div class="modal-body"><div class="review-summary"><div><h1>4.9</h1><p class="muted">375 ulasan</p></div><div>${[5, 4, 3, 2, 1].map((n) => `<div class="line-row"><span>${n} ★</span><progress max="100" value="${n === 5 ? 86 : n === 4 ? 42 : 8}"></progress></div>`).join("")}</div></div><div class="review-list">${["Pelayanan cepat dan item masuk aman.", "Seller responsif, instruksi jelas.", "Harga oke, proses kurang dari 5 menit."].map((text) => `<article class="review-card"><img src="${asset("avatar-asa.png")}" alt=""><div><strong>Pembeli</strong><p>${text}</p><span class="star">★★★★★</span></div></article>`).join("")}</div></div></div>`,
          "leave-review": `<div class="modal"><div class="modal-head"><h2>Beri Ulasan</h2>${close}</div><div class="modal-body"><p class="muted">Bagikan pengalamanmu setelah transaksi.</p><div style="font-size:28px;color:var(--yellow);margin-bottom:14px">★★★★★</div><textarea class="textarea" placeholder="Tulis ulasan..."></textarea></div><div class="modal-foot"><button class="secondary-btn" data-modal-close type="button">Batal</button><button class="primary-btn" data-action="submit-review" type="button">Kirim Ulasan</button></div></div>`,
          cancel: `<div class="modal"><div class="modal-head"><h2>Yakin ingin membatalkan pesanan?</h2>${close}</div><div class="modal-body"><p class="muted">Pesanan yang dibatalkan tidak bisa dilanjutkan kecuali kamu checkout ulang.</p></div><div class="modal-foot"><button class="secondary-btn" data-modal-close type="button">Kembali</button><button class="danger-btn" data-action="cancel-order" type="button">Batalkan Pesanan</button></div></div>`,
          report: `<div class="modal"><div class="modal-head"><h2>Laporkan Penjual</h2>${close}</div><div class="modal-body"><label class="field">Pilih alasan laporan<select class="select"><option>Penipuan / tidak mengirim item</option><option>Respon tidak sopan</option><option>Item tidak sesuai</option></select></label><textarea class="textarea" placeholder="Deskripsikan masalah..."></textarea></div><div class="modal-foot"><button class="secondary-btn" data-modal-close type="button">Batal</button><button class="primary-btn" data-action="submit-report" type="button">Kirim Laporan</button></div></div>`,
          block: `<div class="modal"><div class="modal-head"><h2>Blokir Penjual?</h2>${close}</div><div class="modal-body"><p class="muted">Kamu tidak akan menerima pesan lagi dari penjual ini.</p></div><div class="modal-foot"><button class="secondary-btn" data-modal-close type="button">Batal</button><button class="danger-btn" data-action="block-seller" type="button">Blokir</button></div></div>`,
          logout: `<div class="modal"><div class="modal-head"><h2>Yakin ingin logout?</h2>${close}</div><div class="modal-body"><p class="muted">Kamu akan keluar dari akun Clobyte.</p></div><div class="modal-foot"><button class="secondary-btn" data-modal-close type="button">Batal</button><button class="danger-btn" data-action="logout" type="button">Ya, Logout</button></div></div>`,
        };
        return `<div class="modal-backdrop">${templates[state.modal] || templates.reviews}</div>`;
      }

      function render() {
        if (state.route === "login") return renderAuth("login");
        if (state.route === "register") return renderAuth("register");

        const pages = {
          dashboard: renderDashboard,
          marketplace: renderMarketplace,
          detail: renderDetail,
          checkout: renderCheckout,
          success: renderSuccess,
          transactions: () => renderTransactions(false),
          history: () => renderTransactions(true),
          wishlist: renderWishlist,
          messages: renderMessages,
          settings: renderSettings,
          notifications: renderNotifications,
          help: renderHelp,
        };
        renderShell((pages[state.route] || renderDashboard)());
        bindPageEvents();
      }

      function bindPageEvents() {
        document.querySelectorAll("[data-route]").forEach((button) => {
          button.addEventListener("click", () => go(button.dataset.route));
        });
        document.querySelectorAll("[data-modal]").forEach((button) => {
          button.addEventListener("click", () => setModal(button.dataset.modal));
        });
        document.querySelectorAll("[data-modal-close]").forEach((button) => button.addEventListener("click", () => setModal(null)));
        document.querySelectorAll("[data-product]").forEach((card) => {
          card.addEventListener("click", (event) => {
            if (event.target.closest("[data-wishlist]")) return;
            const product = getProduct(card.dataset.product);
            state.qty = 1;
            go("detail", { product });
          });
        });
        document.querySelectorAll("[data-wishlist]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleWishlist(button.dataset.wishlist);
          });
        });
        document.querySelectorAll("[data-wishlist-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            state.wishlistFilter = button.dataset.wishlistFilter;
            render();
          });
        });
        document.querySelectorAll("[data-game]").forEach((button) => {
          button.addEventListener("click", () => {
            state.filters.game = button.dataset.game;
            go("marketplace");
          });
        });
        document.querySelectorAll("[data-filter]").forEach((select) => {
          select.addEventListener("change", () => {
            state.filters[select.dataset.filter] = select.value;
            render();
          });
        });
        const sortSelect = document.getElementById("sortSelect");
        if (sortSelect) sortSelect.addEventListener("change", () => { state.sort = sortSelect.value; render(); });
        document.querySelectorAll("[data-payment]").forEach((button) => button.addEventListener("click", () => { state.payment = button.dataset.payment; render(); }));
        document.querySelectorAll("[data-conversation]").forEach((button) => button.addEventListener("click", () => { state.selectedConversation = button.dataset.conversation; render(); }));
        document.querySelectorAll("[data-faq]").forEach((button) => button.addEventListener("click", () => button.closest(".faq-item").classList.toggle("open")));

        const chatForm = document.getElementById("chatForm");
        if (chatForm) chatForm.addEventListener("submit", sendMessage);
        const sellerChatForm = document.getElementById("sellerChatForm");
        if (sellerChatForm) sellerChatForm.addEventListener("submit", sendMessage);
        document.querySelectorAll("[data-ai-prompt]").forEach((button) => {
          button.addEventListener("click", () => {
            const form = document.getElementById("chatForm");
            const input = form?.querySelector("input");
            if (!form || !input) return;
            input.value = button.dataset.aiPrompt;
            form.requestSubmit();
          });
        });

        document.querySelectorAll("[data-action]").forEach((element) => {
          element.addEventListener("click", () => handleAction(element.dataset.action, element));
        });
      }

      function handleAction(action, element) {
        if (action === "toggle-password") {
          const input = element.parentElement.querySelector("input");
          input.type = input.type === "password" ? "text" : "password";
        }
        if (action === "qty-minus") {
          state.qty = Math.max(1, state.qty - 1);
          render();
        }
        if (action === "qty-plus") {
          state.qty += 1;
          render();
        }
        if (action === "buy-now") buy();
        if (action === "buy-product") {
          state.qty = 1;
          go("detail", { product: getProduct(element.dataset.id) });
        }
        if (action === "notify-stock") showToast("Notifikasi stok akan dikirim saat item tersedia.");
        if (action === "start-payment") startPayment();
        if (action === "confirm-payment") confirmPayment();
        if (action === "pay") completeOrder();
        if (action === "chat-seller") {
          const trx = activeTransactions().find((item) => item.id === state.activeTransactionId) || activeTransactions()[0];
          const conversation = getConversationForTransaction(trx) || getConversationForProduct(state.selectedProduct);
          state.selectedConversation = conversation?.id || null;
          go("messages");
        }
        if (action === "chat-transaction") {
          const trx = historyTransactions().find((item) => item.id === element.dataset.id) || state.transactions.find((item) => item.id === element.dataset.id);
          const conversation = getConversationForTransaction(trx);
          state.selectedConversation = conversation?.id || null;
          go("messages");
        }
        if (action === "submit-review") {
          setModal(null);
          showToast("Ulasan berhasil dikirim.");
        }
        if (action === "cancel-order") {
          const active = activeTransactions().find((item) => item.id === state.activeTransactionId) || activeTransactions()[0];
          if (active) {
            active.status = "Dibatalkan";
            active.date = formatTransactionDate();
            active.buyer = active.buyer || state.user.name || "Pembeli";
            state.activeTransactionId = activeTransactions()[0]?.id || null;
          }
          setModal(null);
          showToast("Pesanan dibatalkan.");
        }
        if (action === "submit-report") {
          setModal(null);
          showToast("Laporan berhasil dikirim ke tim Clobyte.");
        }
        if (action === "block-seller") {
          setModal(null);
          showToast("Penjual berhasil diblokir.");
        }
        if (action === "logout") {
          state.modal = null;
          state.route = "login";
          render();
        }
        if (action === "save-settings") {
          const name = document.getElementById("settingName")?.value.trim();
          if (name) state.user.name = name;
          showToast("Pengaturan disimpan.");
        }
        if (action === "connect") showToast("Akun berhasil dihubungkan.");
        if (action === "mark-read") {
          state.notifications.forEach((item) => { item.unread = false; });
          showToast("Semua notifikasi ditandai sudah dibaca.");
        }
        if (action === "help-topic") showToast("Topik bantuan dibuka.");
        if (action === "contact-support") {
          state.selectedConversation = "support";
          go("messages");
        }
      }

      window.addEventListener("hashchange", () => {
        const route = window.location.hash.replace("#", "");
        if (route && route !== state.route) {
          state.route = route;
          render();
        }
      });

      const initial = window.location.hash.replace("#", "");
      if (initial) state.route = initial;
      render();
    </script>
  </body>
</html>
